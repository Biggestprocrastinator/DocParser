services:
  # 1. FastAPI Web Server
  - type: web
    name: docparser-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false

  # 2. Celery Background Worker (using the same Dockerfile)
  - type: worker
    name: docparser-celery-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    # Override standard web startup to run the worker instead
    dockerCommand: celery -A tasks worker --loglevel=info --pool=solo
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
